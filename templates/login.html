<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · AI 账号资产管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;510;590;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-marketing: #08090a;
  --bg-panel: #0f1011;
  --bg-elevated: #191a1b;
  --text-primary: #f7f8f8;
  --text-secondary: #d0d6e0;
  --text-tertiary: #8a8f98;
  --text-quaternary: #62666d;
  --brand-indigo: #5e6ad2;
  --brand-violet: #7170ff;
  --brand-hover: #828fff;
  --status-red: #ef4444;
  --border-subtle: rgba(255,255,255,0.05);
  --border-standard: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-marketing);
  color: var(--text-primary);
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 14px; line-height: 1.5;
  font-feature-settings: "cv01", "ss03";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 背景渐变光晕 */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse at center, rgba(94,106,210,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -300px; right: -200px;
  width: 700px; height: 500px;
  background: radial-gradient(ellipse at center, rgba(113,112,255,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

/* Logo 区 */
.logo-area {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 48px; height: 48px;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  background: var(--brand-indigo);
  border-radius: 12px;
  font-size: 24px;
  box-shadow: 0 4px 24px rgba(94,106,210,0.3);
}
.logo-title {
  font-size: 20px; font-weight: 590;
  letter-spacing: -0.4px;
  color: var(--text-primary);
}
.logo-subtitle {
  font-size: 13px; font-weight: 400;
  color: var(--text-tertiary);
  margin-top: 4px;
  letter-spacing: -0.13px;
}

/* 登录卡片 */
.login-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-standard);
  border-radius: 12px;
  padding: 32px;
  box-shadow:
    rgba(0,0,0,0.2) 0px 0px 0px 1px,
    rgba(0,0,0,0.4) 0px 8px 32px;
}

/* 表单 */
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 12px; font-weight: 510;
  color: var(--text-tertiary);
  margin-bottom: 6px;
  letter-spacing: -0.13px;
}
.input-wrap {
  position: relative;
}
.input-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  opacity: 0.4;
  pointer-events: none;
  transition: opacity .15s;
}
input[type="text"], input[type="password"] {
  width: 100%;
  padding: 10px 12px 10px 38px;
  background: rgba(255,255,255,0.02);
  color: var(--text-primary);
  border: 1px solid var(--border-standard);
  border-radius: 6px;
  font-size: 14px; font-family: inherit;
  font-feature-settings: "cv01", "ss03";
  transition: border-color .15s, box-shadow .15s, background .15s;
}
input::placeholder { color: var(--text-quaternary); }
input:focus {
  outline: none;
  border-color: var(--brand-indigo);
  background: rgba(255,255,255,0.04);
  box-shadow: 0 0 0 3px rgba(94,106,210,0.12);
}
input:focus + .input-icon,
.input-wrap:focus-within .input-icon {
  opacity: 0.8;
}

/* 登录按钮 */
.btn-login {
  width: 100%;
  padding: 10px 16px;
  background: var(--brand-indigo);
  color: #ffffff;
  border: none;
  border-radius: 6px;
  font-size: 14px; font-weight: 510;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s, transform .05s;
  letter-spacing: -0.13px;
  margin-top: 4px;
}
.btn-login:hover {
  background: var(--brand-hover);
}
.btn-login:active {
  transform: scale(0.98);
}

/* 错误提示 */
.err-msg {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 6px;
  font-size: 13px; color: var(--status-red);
  margin-bottom: 20px;
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* 底部信息 */
.footer-info {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-quaternary);
  letter-spacing: -0.1px;
}
.footer-info code {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-tertiary);
  padding: 1px 6px;
  background: rgba(255,255,255,0.04);
  border-radius: 3px;
  font-size: 11px;
}

/* 记住我 + 忘记密码 */
.form-options {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
  font-size: 12px;
}
.checkbox-area {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-tertiary);
}
.checkbox-area input {
  width: auto;
  accent-color: var(--brand-indigo);
}
</style>
</head>
<body>

<div class="login-container">
  <!-- Logo 区 -->
  <div class="logo-area">
    <div class="logo-icon">🤖</div>
    <div class="logo-title">AI 账号资产管理</div>
    <div class="logo-subtitle">登录以管理你的 AI 账号资产</div>
  </div>

  <!-- 登录卡片 -->
  <div class="login-card">
    {% if err == "1" %}
    <div class="err-msg">
      <span>⚠️</span>
      <span>用户名或密码错误，请重试</span>
    </div>
    {% endif %}

    <form method="post" action="/login" autocomplete="off">
      <div class="form-group">
        <label for="username">用户名</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="输入用户名" autofocus required>
          <span class="input-icon">👤</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="输入密码" required>
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-area">
          <input type="checkbox" name="remember"> 记住我
        </label>
      </div>

      <button type="submit" class="btn-login">登录</button>
    </form>
  </div>

  <!-- 底部提示 -->
  <div class="footer-info">
    默认账号 <code>admin</code> / <code>admin123</code>
  </div>
</div>

</body>
</html>
