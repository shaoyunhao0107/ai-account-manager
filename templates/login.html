{% extends "base.html" %}
{% block title %}登录 · AI 账号管理{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-box">
    <h2>🔐 登录</h2>
    {% if err == "1" %}
    <div class="err-banner">密码错误</div>
    {% endif %}
    <form method="post" action="/login">
      <input type="password" name="password" placeholder="管理员密码" class="btn" autofocus>
      <button type="submit" class="btn btn-primary" style="width:100%">登录</button>
    </form>
  </div>
</div>
{% endblock %}
